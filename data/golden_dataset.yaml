# Golden Dataset for Retrieval Evaluation
#
# This dataset contains real-world queries and their expected relevant documents.
# Used to evaluate and improve retrieval quality.
#
# Format:
#   queries:
#     - id: unique query identifier
#       query: the search query text
#       description: what the user is looking for
#       expected_docs:
#         - doc_id: document identifier
#           relevance: relevance score (0.0 - 1.0)
#           reason: why this document is relevant

queries:
  # Authentication & Login Issues
  - id: q1
    query: "login failed special characters password"
    description: "User cannot login with special characters in password"
    expected_docs:
      - doc_id: "BUG-123"
        relevance: 1.0
        reason: "Directly describes the login issue with special characters"
      - doc_id: "AUTH-456"
        relevance: 0.8
        reason: "Related authentication bug fix"

  - id: q2
    query: "authentication token expired"
    description: "User session expires too quickly"
    expected_docs:
      - doc_id: "BUG-234"
        relevance: 1.0
        reason: "Describes token expiration issue"
      - doc_id: "DOC-789"
        relevance: 0.6
        reason: "Documentation about token lifecycle"

  # API & Integration
  - id: q3
    query: "REST API authentication endpoints"
    description: "Developer needs API documentation for auth"
